services:
  - type: web
    name: afroradiopedia-ai
    runtime: python
    rootDir: services/ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NEXTJS_URL
        sync: false
